name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; let in-progress runs finish rather than
# cancelling them mid-deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint & type-check
        run: |
          npm run lint
          npm run type-check

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build static export
        env:
          # Project Pages URL is /careerprofile — must prefix all asset paths
          # or CSS/JS 404 and the site renders unstyled. Drop this (and rebuild)
          # once the custom apex domain is the only public URL.
          NEXT_PUBLIC_BASE_PATH: /careerprofile
          NEXT_PUBLIC_SITE_URL: https://xenoframes008.github.io/careerprofile
          NEXT_PUBLIC_ASSET_PREFIX: https://xenoframes008.github.io/careerprofile
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
